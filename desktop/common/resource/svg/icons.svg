<svg xmlns="http://www.w3.org/2000/svg" style="display: none;">
  <!-- Error Icon -->
  <symbol id="icon-error" viewBox="0 0 24 24">
    <circle cx="12" cy="12" r="10" fill="#dc3545" stroke="#c82333" stroke-width="2"/>
    <line x1="12" y1="8" x2="12" y2="13" stroke="white" stroke-width="2" stroke-linecap="round"/>
    <circle cx="12" cy="16" r="1" fill="white"/>
  </symbol>

  <!-- Warning Icon -->
  <symbol id="icon-warning" viewBox="0 0 24 24">
    <path d="M12 2 L22 20 L2 20 Z" fill="#ffc107" stroke="#e0a800" stroke-width="2"/>
    <line x1="12" y1="10" x2="12" y2="15" stroke="#000" stroke-width="2" stroke-linecap="round"/>
    <circle cx="12" cy="18" r="1" fill="#000"/>
  </symbol>

  <!-- File Icon -->
  <symbol id="icon-file" viewBox="0 0 24 24">
    <path d="M14 2 H6 C4.9 2 4 2.9 4 4 V20 C4 21.1 4.9 22 6 22 H18 C19.1 22 20 21.1 20 20 V8 L14 2 Z" fill="#6c757d" stroke="#495057" stroke-width="1"/>
    <polyline points="14,2 14,8 20,8" fill="#495057"/>
  </symbol>

  <!-- Collapsed Arrow -->
  <symbol id="icon-collapsed" viewBox="0 0 24 24">
    <path d="M9 6 L15 12 L9 18" fill="none" stroke="#007bff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  </symbol>

  <!-- Expanded Arrow -->
  <symbol id="icon-expanded" viewBox="0 0 24 24">
    <path d="M6 9 L12 15 L18 9" fill="none" stroke="#007bff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  </symbol>

  <!-- Success/Check Icon -->
  <symbol id="icon-success" viewBox="0 0 24 24">
    <circle cx="12" cy="12" r="10" fill="#28a745" stroke="#218838" stroke-width="2"/>
    <polyline points="8,12 11,15 16,9" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  </symbol>
</svg>
