<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16">
  <!-- Markdown icon: M + down arrow, outline rounded rect (visible on both dark/light) -->
  <rect x="0.5" y="0.5" width="15" height="15" rx="2.5" fill="none" stroke="#888" stroke-width="1"/>
  <!-- M shape -->
  <polyline points="2,11.5 2,5 5,8.5 8,5 8,11.5" fill="none" stroke="#bbb" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round"/>
  <!-- Down arrow -->
  <line x1="12" y1="4.5" x2="12" y2="10.5" stroke="#bbb" stroke-width="1.5" stroke-linecap="round"/>
  <polyline points="9.5,8.5 12,11.5 14.5,8.5" fill="none" stroke="#bbb" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round"/>
</svg>
