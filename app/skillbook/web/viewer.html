        // Convert black color (#000000) to readable color in dark mode only
        function fixDarkModeColors() {
            const contentDiv = document.getElementById('content');
            if (!contentDiv) return;

            // Check if we're in dark mode by checking background color
            const bodyBgColor = window.getComputedStyle(document.body).backgroundColor;

            // Detect dark mode: if background is dark (dark gray/black)
            // Extract RGB values and check if it's a dark color
            const rgbMatch = bodyBgColor.match(/rgb\((\d+),\s*(\d+),\s*(\d+)\)/);
            const isDarkMode = rgbMatch && (parseInt(rgbMatch[1]) < 100);

            if (!isDarkMode) {
                // Light mode: darken text color
                fixLightModeColors();
                return;
            }

            const allElements = contentDiv.querySelectorAll('*');

            allElements.forEach((el) => {
                const computedColor = window.getComputedStyle(el).color;
                // Check for black color
                if (computedColor === 'rgb(0, 0, 0)' || computedColor === '#000000') {
                    // Fix black text to light blue
                    if (el.textContent.trim().length > 0) {
                        el.style.setProperty('color', '#a5d8ff', 'important');
                    }
                }
                // Check for blue color (#0000ff)
                if (computedColor === 'rgb(0, 0, 255)' || computedColor === '#0000ff') {
                    // Fix blue text to accent color (cyan) like SEE ALSO links
                    el.style.setProperty('color', '#4cc9f0', 'important');
                }
                // Check for dark blue color (#003366) - hard to see in dark mode
                if (computedColor === 'rgb(0, 51, 102)' || computedColor === '#003366') {
                    el.style.setProperty('color', '#7cb8d8', 'important');
                }

                // Fix example-box background color in dark mode
                if (el.classList && el.classList.contains('example-box')) {
                    el.style.setProperty('background', '#1f2937', 'important');
                    el.style.setProperty('border', '1px solid #374151', 'important');
                    el.style.setProperty('border-left', '3px solid #f59e0b', 'important');
                    el.style.setProperty('color', '#e5e7eb', 'important');
                }

                // Fix tables with bgcolor in dark mode
                if (el.tagName === 'TABLE' && el.hasAttribute('bgcolor')) {
                    const bg = el.getAttribute('bgcolor').toLowerCase();
                    if (bg === '#ffffff' || bg === 'white' || bg === '#fff') {
                        el.removeAttribute('bgcolor');
                        el.style.setProperty('background-color', '#1e293b', 'important');
                    }
                    if (bg === '#cccccc') {
                        el.removeAttribute('bgcolor');
                        el.style.setProperty('background-color', '#2d3748', 'important');
                    }
                }
                // Fix td/th with bgcolor in dark mode
                if ((el.tagName === 'TD' || el.tagName === 'TH') && el.hasAttribute('bgcolor')) {
                    const bg = el.getAttribute('bgcolor').toLowerCase();
                    if (bg === '#ffffff' || bg === 'white' || bg === '#fff') {
                        el.removeAttribute('bgcolor');
                        el.style.setProperty('background-color', '#1e293b', 'important');
                    }
                    if (bg === '#cccccc') {
                        el.removeAttribute('bgcolor');
                        el.style.setProperty('background-color', '#2d3748', 'important');
                    }
                }

            });
        }

        // Fix text colors in light mode
        function fixLightModeColors() {
            const contentDiv = document.getElementById('content');
            if (!contentDiv) return;

            const allElements = contentDiv.querySelectorAll('*');

            allElements.forEach((el) => {
                // Darken text in description boxes and tables
                if (el.classList) {
                    if (el.classList.contains('description-box') ||
                        el.classList.contains('arg-desc') ||
                        (el.tagName === 'P' && el.parentElement &&
                         (el.parentElement.classList.contains('description-box') ||
                          el.parentElement.classList.contains('references'))) ||
                        (el.tagName === 'LI' && el.parentElement &&
                         el.parentElement.classList.contains('description-box'))) {
                        el.style.setProperty('color', '#1a202c', 'important');
                    }
                }

                // Darken text in references
                if (el.classList && el.classList.contains('references')) {
                    if (el.tagName === 'P') {
                        el.style.setProperty('color', '#1a202c', 'important');
                    }
                }

                // Fix black (#000000) inline style - code identifiers
                const computedColor = window.getComputedStyle(el).color;
                if (computedColor === 'rgb(0, 0, 0)' || computedColor === '#000000') {
                    if (el.style.color && el.textContent.trim().length > 0) {
                        el.style.setProperty('color', '#0369a1', 'important');
                    }
                }
                // Fix blue (#0000ff) inline style - links/references
                if (computedColor === 'rgb(0, 0, 255)' || computedColor === '#0000ff') {
                    el.style.setProperty('color', '#0369a1', 'important');
                }
                // Fix dark blue (#003366) inline style
                if (computedColor === 'rgb(0, 51, 102)' || computedColor === '#003366') {
                    el.style.setProperty('color', '#1e4976', 'important');
                }
            });
        }

        // Detect if we're in dark mode
        function isDarkMode() {
            const bgColor = window.getComputedStyle(document.body).backgroundColor;
            const rgb = bgColor.match(/rgb\((\d+),\s*(\d+),\s*(\d+)\)/);
            if (!rgb) return false;
            const r = parseInt(rgb[1]);
            const g = parseInt(rgb[2]);
            const b = parseInt(rgb[3]);
            // If background is dark (low values), we're in dark mode
            return (r + g + b) / 3 < 128;
        }

        // Setup row click handlers for single selection
        function setupRowClickHandlers() {
            const contentDiv = document.getElementById('content');
            if (!contentDiv) return;

            // Find all argument and return value rows
            const rows = contentDiv.querySelectorAll('table.args-table tbody tr[id^="arg-"], table.args-table tbody tr[id^="ret-"]');

            // Create style element for dark mode
            if (isDarkMode()) {
                const style = document.createElement('style');
                style.textContent = `
                    table.args-table tbody tr.skb-row-selected td {
                        background: #462e2e !important;
                    }
                    table.args-table tbody tr.skb-row-selected:hover td {
                        background: #553d3d !important;
                    }
                `;
                document.head.appendChild(style);
            }

            rows.forEach((row, idx) => {
                row.style.cursor = 'pointer';

                row.addEventListener('click', (e) => {
                    // Don't select if clicking on a link
                    if (e.target.tagName === 'A') {
                        return;
                    }

                    // Check if this row is already selected
                    if (row.classList.contains('skb-row-selected')) {
                        // If already selected, deselect it
                        row.classList.remove('skb-row-selected');
                    } else {
                        // If not selected, remove selection from all rows and select this one
                        rows.forEach(r => r.classList.remove('skb-row-selected'));
                        row.classList.add('skb-row-selected');
                    }
                });
            });
        }

        // Handle @functionName links - navigate to referenced function
        function handleAtLinks() {
            const contentDiv = document.getElementById('content');
            if (!contentDiv) return;

            // Handle @function_name internal links (jump to function)
            const atLinks = contentDiv.querySelectorAll('a[data-jump-to]');
            atLinks.forEach(link => {
                link.style.cursor = 'pointer';
                link.addEventListener('click', async (e) => {
                    e.preventDefault();
                    const funcName = link.getAttribute('data-jump-to');
                    try {
                        const result = await callPython('jump', { name: funcName });
                        if (result.success) {
                            loadFunction(result.index, currentLanguage, true);
                        } else {
                            updateStatus('Function not found: ' + funcName);
                        }
                    } catch (err) {
                        updateStatus('Error: ' + err.message);
                    }
                });
            });

            // Handle ${doc_base}/path/... external links (open in Firefox)
            const externalLinks = contentDiv.querySelectorAll('a[data-external-url]');
            externalLinks.forEach((link) => {
                const url = link.getAttribute('data-external-url');
                link.style.cursor = 'pointer';
                link.addEventListener('click', async (e) => {
                    e.preventDefault();
                    try {
                        // Use callPython to open URL (works in desktop mode)
                        const result = await callPython('openExternalUrl', { url: url });
                        if (result.success) {
                            updateStatus('Opening: ' + url);
                        } else {
                            updateStatus('Failed to open link: ' + (result.error || 'Unknown error'));
                        }
                    } catch (err) {
                        updateStatus('Error opening link: ' + err.message);
                    }
                });

        }

        // Handle anchor links with sticky signature offset
        function handleAnchorNavigation() {
            const contentDiv = document.getElementById('content');
            if (!contentDiv) return;

            // Find all links that point to argument/return anchors
            const links = contentDiv.querySelectorAll('a[href^="#arg-"], a[href^="#ret-"]');

            links.forEach(link => {
                link.addEventListener('click', (e) => {
                    e.preventDefault();
                    const anchorId = link.getAttribute('href').substring(1);
                    const targetElement = document.getElementById(anchorId);

                    if (targetElement) {
                        // Get the signature section height
                        const signatureSection = contentDiv.querySelector('.skb-signature-section');
                        const signatureHeight = signatureSection ? signatureSection.offsetHeight : 0;

                        // Scroll to the target with offset
                        const targetRect = targetElement.getBoundingClientRect();
                        const contentRect = contentDiv.getBoundingClientRect();
                        const relativeTop = targetRect.top - contentRect.top + contentDiv.scrollTop;

                        // Scroll to position: target position - signature height - small padding
                        contentDiv.scrollTop = relativeTop - signatureHeight - 10;

                        // Highlight the target row
                        targetElement.classList.remove('skb-highlighted');
                        void targetElement.offsetWidth; // force reflow to restart animation
                        targetElement.classList.add('skb-highlighted');
                        setTimeout(() => targetElement.classList.remove('skb-highlighted'), 1200);
                    }
                });
            });
        }

                const res = await callPython('isFavorite', { name: funcName });
                if (res.success) {
                    if (res.is_favorite) {
                        heart.classList.add('filled');
                        heart.innerHTML = svgHeartFilled();
                    } else {
                        heart.classList.remove('filled');
                        heart.innerHTML = svgHeartOutline();
                    }
                }
            } catch (e) { /* ignore */ }

            heart.onclick = async (e) => {
                e.stopPropagation();
                try {
                    const res = await callPython('toggleFavorite', { name: funcName });
                    if (res.success) {
                        if (res.is_favorite) {
                            heart.classList.add('filled');
                            heart.innerHTML = svgHeartFilled();
                        } else {
                            heart.classList.remove('filled');
                            heart.innerHTML = svgHeartOutline();
                        }
                    }
                } catch (e) { /* ignore */ }
            };
        }

        async function openFavoritesDialog() {
            try {
                const res = await callPython('getFavorites', {});
                const favorites = (res.success && res.favorites) ? res.favorites : [];
                if (favorites.length === 0) {
                    favoritesList.innerHTML = '<div class="skillbook-favorites-empty">No favorites yet.</div>';
                } else {
                    favoritesList.innerHTML = favorites.map(fav =>
                        `<div class="skillbook-favorites-item" data-name="${escapeHtml(fav.name)}">
                            <span class="skillbook-favorites-item-name">${escapeHtml(fav.name)}</span>
                            <button class="skillbook-favorites-item-delete">&#10005;</button>
                        </div>`
                    ).join('');

                    favoritesList.querySelectorAll('.skillbook-favorites-item').forEach(item => {
                        const deleteBtn = item.querySelector('.skillbook-favorites-item-delete');
                        const nameSpan = item.querySelector('.skillbook-favorites-item-name');

                        nameSpan.addEventListener('click', async () => {
                            const name = item.dataset.name;
                            favoritesDialog.style.display = 'none';
                            _notifyDialogClose();
                            const jumpResult = await callPython('jump', { name });
                            if (jumpResult.success) {
                                loadFunction(jumpResult.index, currentLanguage, true);
                            }
                        });

                        deleteBtn.addEventListener('click', async (e) => {
                            e.stopPropagation();
                            const name = item.dataset.name;
                            try {
                                await callPython('toggleFavorite', { name });
                                await openFavoritesDialog();
                                // Update heart if current function
                                const heart = document.getElementById('headerHeart');
                                if (heart && heart.dataset.func === name) {
                                    heart.classList.remove('filled');
                                    heart.innerHTML = svgHeartOutline();
                                }
                            } catch (err) { /* ignore */ }
                        });
                    });
                }
            } catch (e) {
                favoritesList.innerHTML = '<div class="skillbook-favorites-empty">Failed to load favorites.</div>';
            }
            favoritesDialog.style.display = 'flex';
            favoritesSelectedIndex = -1;
            favoritesDialog.focus();
            _notifyDialogOpen();
        }

        function setupFavoritesListeners() {
            favoritesBtn.addEventListener('click', () => {
                if (favoritesDialog.style.display === 'none') {
                    openFavoritesDialog();
                } else {
                    favoritesDialog.style.display = 'none';
                    _notifyDialogClose();
                }
            });

            favoritesCloseBtn.addEventListener('click', () => {
                favoritesDialog.style.display = 'none';
                _notifyDialogClose();
            });

            favoritesDialog.addEventListener('click', (e) => {
                if (e.target === favoritesDialog) { favoritesDialog.style.display = 'none'; _notifyDialogClose(); }
            });

            favoritesDialog.addEventListener('keydown', async (e) => {
                if (favoritesDialog.style.display === 'none') return;
                const items = favoritesList.querySelectorAll('.skillbook-favorites-item');
                if (e.key === 'Escape') { favoritesDialog.style.display = 'none'; _notifyDialogClose(); return; }
                if (items.length === 0) return;
                if (e.key === 'ArrowDown') {
                    e.preventDefault();
                    favoritesSelectedIndex = Math.min(favoritesSelectedIndex + 1, items.length - 1);
                    updateFavoritesSelection(items);
                } else if (e.key === 'ArrowUp') {
                    e.preventDefault();
                    favoritesSelectedIndex = Math.max(favoritesSelectedIndex - 1, 0);
                    updateFavoritesSelection(items);
                } else if (e.key === 'Enter') {
                    e.preventDefault();
                    if (favoritesSelectedIndex >= 0 && favoritesSelectedIndex < items.length) {
                        const name = items[favoritesSelectedIndex].dataset.name;
                        favoritesDialog.style.display = 'none';
                        _notifyDialogClose();
                        const jumpResult = await callPython('jump', { name });
                        if (jumpResult.success) loadFunction(jumpResult.index, currentLanguage, true);
                    }
                } else if (e.key === 'Delete' || e.key === 'Backspace') {
                    e.preventDefault();
                    if (favoritesSelectedIndex >= 0 && favoritesSelectedIndex < items.length) {
                        const name = items[favoritesSelectedIndex].dataset.name;
                        await callPython('toggleFavorite', { name }).catch(() => {});
                        await openFavoritesDialog();
                        const heart = document.getElementById('headerHeart');
                        if (heart && heart.dataset.func === name) {
                            heart.classList.remove('filled');
                            heart.innerHTML = svgHeartOutline();
                        }
                    }
                }
            });
        }

        function updateFavoritesSelection(items) {
            items.forEach((item, i) => {
                if (i === favoritesSelectedIndex) {
                    item.classList.add('selected');
                    item.scrollIntoView({ block: 'nearest' });
                } else {
                    item.classList.remove('selected');
                }
            });
        }

        // ─── Comments ───

        let currentCommentsFunc = '';

        async function loadComments(funcName) {
            currentCommentsFunc = funcName;
            const contentDiv = document.getElementById('content');
            if (!contentDiv) return;

            // Remove existing comments section
            const existing = contentDiv.querySelector('.skb-comments-section');
            if (existing) existing.remove();

            // Find scrollable section to append to
            const scrollable = contentDiv.querySelector('.skb-scrollable-section');
            if (!scrollable) return;

            try {
                const res = await callPython('getComments', { name: funcName });
                const comments = (res.success && res.comments) ? res.comments : [];
                const currentUser = (res.success && res.current_user) ? res.current_user : '';

                const section = document.createElement('div');
                section.className = 'skb-comments-section';
                section.innerHTML = buildCommentsHtml(comments, currentUser, funcName, uiLanguage);
                scrollable.appendChild(section);

                // Store raw content on each comment element so edit textarea gets original markdown
                const rawMap = {};
                function collectRaw(list) { list.forEach(c => { rawMap[c.id] = c.content; if (c.children) collectRaw(c.children); }); }
                collectRaw(comments);
                section.querySelectorAll('.skb-comment[data-id]').forEach(el => {
                    const contentEl = el.querySelector('.skb-comment-content');
                    if (contentEl && rawMap[el.dataset.id] !== undefined) contentEl.dataset.raw = rawMap[el.dataset.id];
                });

                setupCommentListeners(section, funcName, currentUser);
            } catch (e) { /* ignore */ }
        }

        function buildCommentsHtml(comments, currentUser, funcName, lang) {
            const texts = uiTexts[lang] || uiTexts.en;
            // Build tree: map id -> children
            const roots = [];
            const map = {};
            comments.forEach(c => { map[c.id] = { ...c, children: [] }; });
            comments.forEach(c => {
                if (c.parent_id && map[c.parent_id]) {
                    map[c.parent_id].children.push(map[c.id]);
                } else {
                    roots.push(map[c.id]);
                }
            });

            function renderComment(c, depth) {
                const displayName = c.display_name || c.user_id;
                const initials = displayName.substring(0, 2).toUpperCase();
                const avatarMime = c.avatar_mime || 'image/jpeg';
                const avatarHtml = c.avatar_small && c.avatar_small.length > 0
                    ? `<img src="data:${avatarMime};base64,${c.avatar_small}" alt="${escapeHtml(displayName)}" style="width:100%;height:100%;object-fit:cover;">`
                    : `<span>${escapeHtml(initials)}</span>`;
                const canEdit = c.user_id === currentUser;
                const canDelete = c.user_id === currentUser;
                const timeStr = formatCommentTime(c.created_at);
                const repliesHtml = c.children.length
                    ? `<div class="skb-comment-replies">${c.children.map(ch => renderComment(ch, depth + 1)).join('')}</div>`
                    : '';
                return `<div class="skb-comment" data-id="${c.id}">
                    <div class="skb-comment-avatar">${avatarHtml}</div>
                    <div class="skb-comment-body">
                        <div class="skb-comment-meta">
                            <span class="skb-comment-user">${escapeHtml(displayName)}</span>
                            <span class="skb-comment-time">${escapeHtml(timeStr)}</span>
                            <div class="skb-comment-actions">
                                <button class="skb-comment-action-btn reply-btn">${texts.reply}</button>
                                ${canEdit ? `<button class="skb-comment-action-btn edit-btn">${texts.edit}</button>` : ''}
                                ${canDelete ? `<button class="skb-comment-action-btn delete">${texts.delete}</button>` : ''}
                            </div>
                        </div>
                        <div class="skb-comment-content">${renderMarkdown(c.content)}</div>
                        <div class="skb-comment-edit-form">
                            <div class="skb-comment-form">
                                <textarea class="skb-comment-input" rows="2">${escapeHtml(c.content)}</textarea>
                                <button class="skb-comment-submit-btn edit-save-btn">${texts.save}</button>
                                <button class="skb-comment-cancel-btn edit-cancel-btn">${texts.cancel}</button>
                            </div>
                        </div>
                        <div class="skb-comment-reply-form" data-parent="${c.id}">
                            <div class="skb-comment-form">
                                <textarea class="skb-comment-input" rows="2" placeholder="${texts.writeReply}"></textarea>
                                <button class="skb-comment-submit-btn">${texts.reply}</button>
                                <button class="skb-comment-cancel-btn">${texts.cancel}</button>
                            </div>
                        </div>
                        ${repliesHtml}
                    </div>
                </div>`;
            }

            const listHtml = roots.length
                ? `<div class="skb-comment-list">${roots.map(c => renderComment(c, 0)).join('')}</div>`
                : `<div class="skb-comment-empty">${texts.noComments}</div>`;

            return `<div class="skb-comments-heading">Comments</div>
                ${listHtml}
                <div class="skb-comment-form">
                    <textarea class="skb-comment-input" id="newCommentInput" rows="2" placeholder="${texts.writeComment}"></textarea>
                    <button class="skb-comment-submit-btn" id="newCommentSubmit">${texts.post}</button>
                </div>`;
        }

        function formatCommentTime(isoStr) {
            try {
                const d = new Date(isoStr + 'Z');
                return d.toLocaleString();
            } catch (e) {
                return isoStr;
            }
        }

        function autoResizeTextarea(el) {
            el.style.height = 'auto';
            el.style.height = el.scrollHeight + 'px';
        }

        function bindAutoResize(el) {
            el.addEventListener('keydown', (e) => {
                if (e.key === 'Tab') {
                    e.preventDefault();
                    const start = el.selectionStart;
                    const end = el.selectionEnd;
                    el.value = el.value.substring(0, start) + '    ' + el.value.substring(end);
                    el.selectionStart = el.selectionEnd = start + 4;
                }
            });
            el.addEventListener('input', () => {
                autoResizeTextarea(el);
                // Scroll only if the bottom of textarea is clipped
                const rect = el.getBoundingClientRect();
                const scrollable = el.closest('#content');
                if (scrollable) {
                    const sRect = scrollable.getBoundingClientRect();
                    const overflow = rect.bottom - sRect.bottom;
                    if (overflow > 0) {
                        scrollable.scrollTop += overflow + 8;
                    }
                }
            });
            autoResizeTextarea(el);
        }

        function setupCommentListeners(section, funcName, currentUser) {
            // Apply auto-resize to all textareas in this section
            section.querySelectorAll('textarea.skb-comment-input').forEach(bindAutoResize);

            // Top-level new comment
            const newInput = section.querySelector('#newCommentInput');
            const newSubmit = section.querySelector('#newCommentSubmit');
            if (newSubmit && newInput) {
                newSubmit.addEventListener('click', async () => {
                    const content = newInput.value.trim();
                    if (!content) return;
                    try {
                        await callPython('addComment', { name: funcName, content, parent_id: null });
                        await loadComments(funcName);
                    } catch (e) { /* ignore */ }
                });
                newInput.addEventListener('keydown', (e) => {
                    if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) {
                        e.preventDefault();
                        newSubmit.click();
                    }
                });
            }

            // Per-comment actions
            section.querySelectorAll('.skb-comment').forEach(commentEl => {
                const commentId = parseInt(commentEl.dataset.id);

                // Reply button
                const replyBtn = commentEl.querySelector('.reply-btn');
                const replyForm = commentEl.querySelector('.skb-comment-reply-form');
                if (replyBtn && replyForm) {
                    replyBtn.addEventListener('click', () => {
                        replyForm.classList.toggle('active');
                        if (replyForm.classList.contains('active')) {
                            replyForm.querySelector('textarea').focus();
                        }
                    });

                    const replyInput = replyForm.querySelector('textarea');
                    const replySubmit = replyForm.querySelector('.skb-comment-submit-btn');
                    const replyCancel = replyForm.querySelector('.skb-comment-cancel-btn');

                    replySubmit.addEventListener('click', async () => {
                        const content = replyInput.value.trim();
                        if (!content) return;
                        try {
                            await callPython('addComment', { name: funcName, content, parent_id: commentId });
                            await loadComments(funcName);
                        } catch (e) { /* ignore */ }
                    });

                    replyInput.addEventListener('keydown', (e) => {
                        if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) {
                            e.preventDefault();
                            replySubmit.click();
                        }
                    });

                    replyCancel.addEventListener('click', () => {
                        replyForm.classList.remove('active');
                        replyInput.value = '';
                    });
                }

                // Edit button
                const editBtn = commentEl.querySelector('.edit-btn');
                const editForm = commentEl.querySelector('.skb-comment-edit-form');
                const contentEl = commentEl.querySelector('.skb-comment-content');
                if (editBtn && editForm) {
                    const editInput = editForm.querySelector('textarea');
                    const editSave = editForm.querySelector('.edit-save-btn');
                    const editCancel = editForm.querySelector('.edit-cancel-btn');

                    editBtn.addEventListener('click', () => {
                        editInput.value = contentEl.dataset.raw || contentEl.textContent;
                        editForm.classList.add('active');
                        contentEl.style.display = 'none';
                        autoResizeTextarea(editInput);
                        editInput.focus();
                    });

                    editSave.addEventListener('click', async () => {
                        const content = editInput.value.trim();
                        if (!content) return;
                        try {
                            const res = await callPython('editComment', { id: commentId, content });
                            if (res.success) {
                                await loadComments(funcName);
                            }
                        } catch (e) { /* ignore */ }
                    });

                    editInput.addEventListener('keydown', (e) => {
                        if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) {
                            e.preventDefault();
                            editSave.click();
                        }
                        if (e.key === 'Escape') {
                            editCancel.click();
                        }
                    });

                    editCancel.addEventListener('click', () => {
                        editForm.classList.remove('active');
                        contentEl.style.display = '';
                    });
                }

                // Delete button
                const deleteBtn = commentEl.querySelector('.skb-comment-action-btn.delete');
                if (deleteBtn) {
                    deleteBtn.addEventListener('click', async () => {
                        try {
                            const res = await callPython('deleteComment', { id: commentId });
                            if (res.success) {
                                await loadComments(funcName);
                            }
                        } catch (e) { /* ignore */ }
                    });
                }
            });
        }

        // No app state auto-loading needed for skillbook
        window.getAppStateAction = function() { return null; };

        // Sync hljs theme when theme CSS link is added/changed
        new MutationObserver(syncHljsTheme).observe(document.head, { childList: true, subtree: true, attributes: true, attributeFilter: ['href'] });
        syncHljsTheme();

        // Start initialization when page loads
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', init);
        } else {
            init();
        }
    </script>

    <!-- Favorites Dialog -->

                    <div class="skillbook-settings-label-text" id="settingsLangLabel">Language</div>

                        <option value="1">English</option>
                    </select>
                </label>
            </div>
            <div class="skillbook-settings-shortcuts">
                <div class="skillbook-settings-shortcuts-title" id="shortcutsTitle">Keyboard Shortcuts</div>
                <div class="skillbook-settings-shortcuts-list">
                    <div class="skillbook-settings-shortcut-item" id="shortcutArrows">← → : Previous / Next function</div>

            <div class="skillbook-settings-footer">

    <!-- Filter Dialog -->
    <div id="filterDialog" class="skillbook-filter-dialog" style="display:none;" tabindex="-1">
        <div class="skillbook-filter-dialog-inner">
            <div class="skillbook-filter-title">Filter by Section</div>
            <div class="skillbook-filter-list" id="filterSectionList">
                <!-- Populated by JS -->
            </div>
            <button id="filterCloseBtn" class="skillbook-filter-close-btn">Close</button>
        </div>
    </div>
