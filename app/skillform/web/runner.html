<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form Runner - Skill Form</title>
    <script>
    // Standalone Qt window always starts with white theme to avoid dark flash
    (function() {
        var p = new URLSearchParams(window.location.search);
        if (window.parent === window && p.get('standalone') === '1') {
            var l = document.createElement('link');
            l.rel = 'stylesheet'; l.href = '/common/style/white.css';
            l.setAttribute('data-theme-css', 'true');
            document.head.appendChild(l);
        }
    })();
    </script>
    <script src="/common/script/appinit.js" onerror="this.onerror=null;this.src='../../../../web/common/script/appinit.js';"></script>
</head>
<body>
<link rel="stylesheet" href="skillform.css" onerror="this.onerror=null;this.href='/app/skillform/skillform.css';">

<div class="sfr-root">

    <!-- Board back toolbar (shown when viewing detail from a board) -->
    <div class="sfr-board-toolbar" id="sfr-board-toolbar" style="display:none">
        <button class="sfr-board-back-btn" id="sfr-board-back-btn" onclick="boardNavBack()">&#8592; 목록</button>
    </div>

    <!-- Form area (grid-rendered) -->
    <div class="sfr-form" id="sfr-form"></div>

    <!-- Result area -->
    <div class="sfr-result" id="sfr-result" style="display:none">
        <div class="sfd-props-title">Result</div>
        <pre id="sfr-result-json"></pre>
    </div>

</div>

<script>
// ================================================================
// STATE
// ================================================================
let currentSchema   = null;
let formValues      = {};
let currentRecordId = null;
let _currentLang    = new URLSearchParams(window.location.search).get('lang') || 'en';

// ================================================================
// RENDER FORM from skillform JSON schema
// ================================================================
function renderForm(schema) {
    currentSchema = schema;
    formValues    = {};
    _boardFields  = [];

    // Set window title from docProps
    const formName = (schema.docProps && schema.docProps.formName) || schema.title || '';
    if (formName) document.title = formName;

    const formEl = document.getElementById('sfr-form');
    formEl.style.display = 'block';

    // Apply document font size; scale grid proportionally to base size of 14px
    const fontSize = (schema.docProps && schema.docProps.fontSize) || 16;
    const scale = fontSize / 14;
    const rootEl = document.querySelector('.sfr-root');
    rootEl.style.fontSize = fontSize + 'px';
    rootEl.style.setProperty('--runner-font-size', fontSize + 'px');

    // Apply theme override from docProps (default: light)
    const theme = (schema.docProps && schema.docProps.theme) || 'light';
    if (theme !== 'auto') {
        const isLight = theme !== 'dark';
        rootEl.classList.toggle('sfr-light', isLight);
        if (window.SkillupTheme) {
            window.SkillupTheme.setTheme(isLight ? 'white' : 'default');
        } else {
            // appinit.js not yet loaded: inject theme link directly
            const existingThemeLink = document.querySelector('link[data-skillform-theme]');
            if (existingThemeLink) existingThemeLink.remove();
            const link = document.createElement('link');
            link.rel = 'stylesheet';
            link.setAttribute('data-skillform-theme', '1');
            link.href = isLight ? '/common/style/white.css' : '/common/style/default.css';
            document.head.appendChild(link);
        }
    }

    const MARGIN   = 16; // inner margin around the form grid (px)

    const baseRowH = (schema.grid && schema.grid.rowHeight) || 56;
    const baseCellW = (schema.grid && schema.grid.cellW)    || 56;
    const gridRowH = Math.round(baseRowH * scale);
    const cellW    = Math.round(baseCellW * scale);
    const fields   = schema.fields || [];

    // Compute canvas size based on formSize setting
    const docProps = schema.docProps || {};
    const formSize = docProps.formSize || { mode: 'auto', cols: 0, rows: 0 };

    let maxRow = 0, maxCol = 0;
    fields.forEach(f => {
        maxRow = Math.max(maxRow, f.row + f.h);
        maxCol = Math.max(maxCol, f.col + f.w);
    });

    // Apply formSize override if in 'set' mode
    if (formSize.mode === 'set') {
        if (formSize.cols > 0) maxCol = formSize.cols;
        if (formSize.rows > 0) maxRow = formSize.rows;
    }

    // Clear previous form content
    formEl.innerHTML = '';
    formEl.style.position = 'relative';
    const contentH = maxRow * gridRowH + MARGIN * 2;
    const contentW = maxCol * cellW    + MARGIN * 2;
    formEl.style.height = 'auto';
    formEl.style.width  = 'auto';
    formEl.style.minHeight = contentH + 'px';
    formEl.style.minWidth  = contentW + 'px';

    // Enforce minimum window size
    const MIN_W = 300, MIN_H = 150;

    // Render separators first so they appear below other components
    const sorted = [...fields].sort((a, b) => (a.type === 'separator' ? -1 : 0) - (b.type === 'separator' ? -1 : 0));
    sorted.forEach(f => {
        const el = document.createElement('div');
        el.className = 'sfr-field';

        // Separator box: position/size adjusted by center vs edge
        if (f.type === 'separator' && (f.lineType || 'horizontal') === 'box') {
            const isEdge = f.align === 'edge';
            const ox = isEdge ? 0 : cellW / 2;
            const oy = isEdge ? 0 : gridRowH / 2;
            el.style.left   = (f.col * cellW   + ox + MARGIN) + 'px';
            el.style.top    = (f.row * gridRowH + oy + MARGIN) + 'px';
            el.style.width  = (f.w   * cellW   - ox * 2) + 'px';
            el.style.height = (f.h   * gridRowH - oy * 2) + 'px';
            el.style.padding = '0';
        } else {
            el.style.left   = (f.col * cellW   + MARGIN) + 'px';
            el.style.width  = (f.w   * cellW) + 'px';
            el.style.top    = (f.row * gridRowH + MARGIN) + 'px';
            el.style.height = (f.h   * gridRowH) + 'px';
        }

        el.appendChild(buildFieldWidget(f, gridRowH));
        formEl.appendChild(el);
    });

    document.getElementById('sfr-result').style.display = 'none';

    // Standalone mode: resize Qt window to fit form content
    if (_isStandaloneMode) {
        callPython('resize_window', { w: Math.max(contentW, MIN_W), h: Math.max(contentH, MIN_H) }).catch(() => {});
    }
}

function buildFieldWidget(f, rowH) {
    const wrap = document.createElement('div');
    wrap.className = 'sfr-widget';

    if (f.type !== 'separator') {
        wrap.style.fontFamily = (f.font === 'sans')
            ? 'var(--font-sans)' : 'var(--font-mono)';
    }

    if (f.type === 'separator') {
        const lt = f.lineType || 'horizontal';
        const isEdge = f.align === 'edge';
        if (lt === 'vertical') {
            wrap.style.flexDirection = 'row';
            wrap.style.alignItems = isEdge ? 'flex-start' : 'center';
        } else if (lt === 'box') {
            // position/size already handled in sfr-field; widget fills it
        } else {
            wrap.style.justifyContent = isEdge ? 'flex-start' : 'center';
        }
    }

    const label = f.type !== 'separator' && f.type !== 'label' && f.type !== 'button';
    if (label && f.label) {
        const lbl = document.createElement('label');
        lbl.className = 'sfr-label';
        lbl.textContent = f.label + (f.required ? ' *' : '');
        lbl.htmlFor = 'sfr-' + f.id;
        wrap.appendChild(lbl);
    }

    let input = null;

    switch (f.type) {
        case 'text':
            input = document.createElement('input');
            input.type = 'text';
            input.id = 'sfr-' + f.id;
            if (f.placeholder) input.placeholder = f.placeholder;
            if (f.default)     input.value = f.default;
            if (f.readonly)    input.readOnly = true;
            input.addEventListener('input', () => { formValues[f.id] = input.value; });
            formValues[f.id] = f.default || '';
            break;

        case 'number':
            input = document.createElement('input');
            input.type = 'number';
            input.id = 'sfr-' + f.id;
            if (f.min !== '' && f.min !== undefined) input.min = f.min;
            if (f.max !== '' && f.max !== undefined) input.max = f.max;
            if (f.default !== '') input.value = f.default;
            if (f.readonly) input.readOnly = true;
            input.addEventListener('input', () => { formValues[f.id] = parseFloat(input.value); });
            formValues[f.id] = f.default !== undefined ? Number(f.default) : 0;
            break;

        case 'checkbox':
            input = document.createElement('input');
            input.type = 'checkbox';
            input.id = 'sfr-' + f.id;
            input.checked = (f.default === true || f.default === 'true');
            input.disabled = f.readonly;
            input.addEventListener('change', () => { formValues[f.id] = input.checked; });
            formValues[f.id] = input.checked;
            break;

        case 'toggle':
            input = document.createElement('label');
            input.className = 'sfr-toggle';
            const toggleCb = document.createElement('input');
            toggleCb.type = 'checkbox';
            toggleCb.id = 'sfr-' + f.id;
            toggleCb.checked = (f.default === true || f.default === 'true');
            toggleCb.disabled = f.readonly;
            const slider = document.createElement('span');
            slider.className = 'sfr-toggle-slider';
            input.appendChild(toggleCb);
            input.appendChild(slider);
            toggleCb.addEventListener('change', () => { formValues[f.id] = toggleCb.checked; });
            formValues[f.id] = toggleCb.checked;
            break;

        case 'dropdown':
            input = document.createElement('select');
            input.id = 'sfr-' + f.id;
            input.disabled = f.readonly;
            (f.options || []).forEach(opt => {
                const o = document.createElement('option');
                o.value = opt; o.textContent = opt;
                if (opt === f.default) o.selected = true;
                input.appendChild(o);
            });
            input.addEventListener('change', () => { formValues[f.id] = input.value; });
            formValues[f.id] = input.value;
            break;

        case 'radio': {
            input = document.createElement('div');
            input.className = 'sfr-radio-group' + (f.inline ? ' sfr-radio-group-inline' : '');
            (f.options || []).forEach(opt => {
                const radioId = 'sfr-' + f.id + '-' + opt.replace(/\s/g,'_');
                const row = document.createElement('label');
                row.className = 'sfr-radio-row';
                const rb = document.createElement('input');
                rb.type = 'radio';
                rb.name = 'sfr-' + f.id;
                rb.id = radioId;
                rb.value = opt;
                if (opt === f.default) { rb.checked = true; formValues[f.id] = opt; }
                rb.disabled = f.readonly;
                rb.addEventListener('change', () => { if (rb.checked) formValues[f.id] = opt; });
                row.appendChild(rb);
                row.appendChild(document.createTextNode(' ' + opt));
                input.appendChild(row);
            });
            if (!formValues[f.id] && f.options && f.options.length) {
                formValues[f.id] = f.options[0];
            }
            break;
        }

        case 'textarea':
            input = document.createElement('textarea');
            input.id = 'sfr-' + f.id;
            input.rows = f.rows || 3;
            if (f.placeholder) input.placeholder = f.placeholder;
            if (f.default)     input.value = f.default;
            if (f.readonly)    input.readOnly = true;
            input.style.resize = 'none';
            input.style.height = '100%';
            input.addEventListener('input', () => { formValues[f.id] = input.value; });
            formValues[f.id] = f.default || '';
            break;

        case 'file':
            input = document.createElement('div');
            input.className = 'sfr-file-row';
            const fileInput = document.createElement('input');
            fileInput.type = 'text';
            fileInput.id = 'sfr-' + f.id;
            fileInput.placeholder = f.placeholder || '';
            fileInput.value = f.default || '';
            fileInput.readOnly = f.readonly;
            fileInput.addEventListener('input', () => { formValues[f.id] = fileInput.value; });
            formValues[f.id] = f.default || '';
            input.appendChild(fileInput);
            if (!f.readonly) {
                const browseBtn = document.createElement('button');
                browseBtn.className = 'sfr-file-browse-btn';
                browseBtn.textContent = '…';
                browseBtn.type = 'button';
                browseBtn.addEventListener('click', async () => {
                    let result;
                    if (f.dirOnly) {
                        result = await callPython('select_directory', {});
                    } else {
                        result = await callPython('select_file', { filter: f.filter || '' });
                    }
                    if (result && result.success && result.path) {
                        fileInput.value = result.path;
                        formValues[f.id] = result.path;
                    }
                });
                input.appendChild(browseBtn);
            }
            break;

        case 'date':
            input = document.createElement('input');
            input.type = 'date';
            input.id = 'sfr-' + f.id;
            if (f.default) input.value = f.default;
            if (f.readonly) input.readOnly = true;
            input.addEventListener('change', () => { formValues[f.id] = input.value; });
            formValues[f.id] = f.default || '';
            break;

        case 'color':
            input = document.createElement('input');
            input.type = 'color';
            input.id = 'sfr-' + f.id;
            input.value = f.default || '#000000';
            input.disabled = f.readonly;
            input.addEventListener('input', () => { formValues[f.id] = input.value; });
            formValues[f.id] = input.value;
            break;

        case 'slider': {
            input = document.createElement('div');
            input.className = 'sfr-slider-row';
            const sl = document.createElement('input');
            sl.type = 'range';
            sl.id = 'sfr-' + f.id;
            if (f.min !== '' && f.min !== undefined) sl.min = f.min;
            if (f.max !== '' && f.max !== undefined) sl.max = f.max;
            if (f.step) sl.step = f.step;
            sl.value = f.default || sl.min || 0;
            sl.disabled = f.readonly;
            const slVal = document.createElement('span');
            slVal.className = 'sfr-slider-val';
            slVal.textContent = sl.value;
            sl.addEventListener('input', () => {
                formValues[f.id] = parseFloat(sl.value);
                slVal.textContent = sl.value;
            });
            formValues[f.id] = parseFloat(sl.value);
            input.appendChild(sl);
            input.appendChild(slVal);
            break;
        }

        case 'label': {
            const tagMap = { small:'small', normal:'p', large:'p', h3:'h3', h2:'h2', h1:'h1' };
            const tag = tagMap[f.fontSize] || 'p';
            input = document.createElement(tag);
            input.textContent = f.label || '';
            input.className = 'sfr-label-widget';
            break;
        }

        case 'separator': {
            const lt = f.lineType || 'horizontal';
            input = document.createElement('div');
            if (lt === 'vertical') {
                input.className = 'sfr-separator-v';
            } else if (lt === 'box') {
                input.className = 'sfr-separator-box';
            } else {
                input.className = 'sfr-separator';
            }
            break;
        }

        case 'button': {
            input = document.createElement('button');
            input.type = 'button';
            input.id = 'sfr-' + f.id;
            input.textContent = f.label || f.id;
            const variantMap = { primary: 'sfr-btn-primary', secondary: 'sfr-btn-secondary', danger: 'sfr-btn-danger' };
            input.className = 'sfr-btn ' + (variantMap[f.variant] || 'sfr-btn-primary');
            input.style.height = 'auto';
            wrap.style.justifyContent = 'flex-end';
            input.addEventListener('click', () => {
                const payload = { button_id: f.id, values: Object.assign({}, formValues) };
                if (f.boardCommand && f.boardCommand !== 'NONE') {
                    payload.board_command = f.boardCommand;
                    if (currentRecordId) payload.record_id = currentRecordId;
                }
                callPython('runner_button_click', payload).then(res => {
                    if (!res) return;
                    if (res.board_ok) {
                        if (f.boardCommand === 'POST') currentRecordId = res.record_id || null;
                        if (f.boardCommand === 'DELETE') currentRecordId = null;
                        boardNavBack();
                    }
                });
            });
            break;
        }

        case 'board': {
            const boardEl = document.createElement('div');
            boardEl.id = 'sfr-board-' + f.id;
            boardEl.className = 'sfr-board';
            boardEl.style.cssText = 'width:100%;height:100%;overflow:auto;';
            boardEl.innerHTML = '<div style="padding:8px;opacity:0.5">Loading...</div>';
            wrap.appendChild(boardEl);
            _loadBoardData(f, boardEl);
            return wrap;
        }

        default:
            input = document.createElement('input');
            input.type = 'text';
            if (f.default) input.value = f.default;
            input.addEventListener('input', () => { formValues[f.id] = input.value; });
            formValues[f.id] = f.default || '';
    }

    if (input) wrap.appendChild(input);
    return wrap;
}

function setStatus(msg, type) {}

// ================================================================
// BOARD COMPONENT
// ================================================================
let _boardFields = [];
let _listSchema = null;

async function _loadBoardData(fieldDef, containerEl) {
    _boardFields = _boardFields.filter(b => b.id !== fieldDef.id);
    const detailPath = fieldDef.detailFormPath || '';
    const [res, fieldsRes] = await Promise.all([
        callPython('board_list', { detail_form_path: detailPath, board_id: fieldDef.id }).catch(() => null),
        detailPath ? callPython('board_read_detail_fields', { path: detailPath }).catch(() => null) : Promise.resolve(null),
    ]);
    const fieldLabels = {};
    if (fieldsRes && fieldsRes.fields) {
        fieldsRes.fields.forEach(f => { fieldLabels[f.id] = f.label; });
    }
    _boardFields.push({ id: fieldDef.id, fieldDef, containerEl, fieldLabels });
    _renderBoardTable(fieldDef, containerEl, res ? res.records : [], fieldLabels);
}

function _normalizeListColumns(raw) {
    // Accept both string[] and {id, width?}[] formats
    if (!raw || !raw.length) return [{ id: '@created_at', width: '' }];
    return raw.map(c => (typeof c === 'string') ? { id: c, width: '' } : c);
}

function _resolveWidths(cols) {
    // Compute actual CSS width values; 'rest' gets the remainder
    const restIdx = cols.findIndex(c => c.width === 'rest' || c.width === 'auto');
    const fixed = cols.filter((_, i) => i !== restIdx)
                      .map(c => parseFloat(c.width) || 0);
    const usedPct = fixed.reduce((a, b) => a + b, 0);
    return cols.map((c, i) => {
        if (i === restIdx) return `${Math.max(0, 100 - usedPct)}%`;
        const n = parseFloat(c.width);
        return isNaN(n) ? '' : `${n}%`;
    });
}

function _renderBoardTable(fieldDef, containerEl, records, fieldLabels) {
    const cols = _normalizeListColumns(fieldDef.listColumns);
    const widths = _resolveWidths(cols);
    let html = '<table class="sfr-board-table"><thead><tr>';
    cols.forEach((c, i) => {
        const w = widths[i] ? ` style="width:${widths[i]}"` : '';
        html += `<th${w}>${_colLabel(c.id, fieldLabels)}</th>`;
    });
    html += '</tr></thead><tbody>';
    if (!records.length) {
        html += `<tr><td colspan="${cols.length}" style="padding:12px;opacity:0.5;text-align:center">-</td></tr>`;
    }
    records.forEach(rec => {
        const rid = rec['@record_id'] || '';
        const sel = (rid && rid === currentRecordId) ? ' class="sfr-board-row-selected"' : '';
        html += `<tr data-rid="${rid}" style="cursor:pointer"${sel}>`;
        cols.forEach(c => {
            let v = rec[c.id] !== undefined ? rec[c.id] : '';
            if (c.id === '@created_at' || c.id === '@updated_at') v = String(v).replace('T', ' ').replace('Z', '');
            html += `<td>${_escHtml(String(v))}</td>`;
        });
        html += '</tr>';
    });
    html += '</tbody></table>';
    containerEl.innerHTML = html;
    containerEl.querySelectorAll('tr[data-rid]').forEach(tr => {
        tr.addEventListener('click', () => {
            const rid = tr.dataset.rid;
            if (!rid) return;
            _boardNavToDetail(rid, fieldDef);
        });
    });
    if (fieldDef.detailFormPath) {
        const newBtn = document.createElement('button');
        newBtn.className = 'sfr-board-new-btn';
        newBtn.textContent = '+ 새 글';
        newBtn.addEventListener('click', () => _boardNavToDetail(null, fieldDef));
        containerEl.appendChild(newBtn);
    }
}

const _SYS_COL_LABELS = {
    ko: { '@record_id': '레코드ID', '@row_id': '번호', '@created_at': '생성일시', '@updated_at': '수정일시' },
    en: { '@record_id': 'Record ID', '@row_id': 'No', '@created_at': 'Created At', '@updated_at': 'Updated At' },
};

function _colLabel(col, fieldLabels) {
    const sysLabels = _SYS_COL_LABELS[_currentLang] || _SYS_COL_LABELS.en;
    if (col.startsWith('@')) return sysLabels[col] !== undefined ? sysLabels[col] : col;
    return (fieldLabels && fieldLabels[col] !== undefined) ? fieldLabels[col] : col;
}

function _escHtml(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

async function _boardNavToDetail(rid, fieldDef) {
    const detailPath = fieldDef.detailFormPath || '';
    if (!detailPath) return;

    const tasks = [callPython('runner_load_schema', { path: detailPath }).catch(() => null)];
    if (rid) tasks.push(callPython('board_get', { record_id: rid, detail_form_path: detailPath }).catch(() => null));

    const results = await Promise.all(tasks);
    const schemaRes = results[0];
    const recordRes = rid ? results[1] : null;

    if (!schemaRes || !schemaRes.success || !schemaRes.schema) return;

    // Save list context before switching
    _listSchema = currentSchema;
    currentRecordId = rid || null;

    renderForm(schemaRes.schema);
    if (recordRes && recordRes.record) applySetValues(recordRes.record);

    document.getElementById('sfr-board-toolbar').style.display = '';
}

function boardNavBack() {
    if (!_listSchema) return;
    const schema = _listSchema;
    _listSchema = null;
    currentRecordId = null;
    renderForm(schema);
    document.getElementById('sfr-board-toolbar').style.display = 'none';
}

function _refreshAllBoards() {
    _boardFields.forEach(b => _loadBoardData(b.fieldDef, b.containerEl));
}

// ================================================================
// SET VALUES (from caller via TCP → Python state_update → JS)
// ================================================================
function applySetValues(values) {
    if (!currentSchema || !values) return;
    currentSchema.fields.forEach(f => {
        if (!(f.id in values)) return;
        const val = values[f.id];
        const el = document.getElementById('sfr-' + f.id);
        if (!el) return;
        if (f.type === 'checkbox') {
            el.checked = !!val;
            formValues[f.id] = !!val;
        } else if (f.type === 'toggle') {
            el.checked = !!val;
            formValues[f.id] = !!val;
        } else if (f.type === 'number') {
            el.value = val;
            formValues[f.id] = Number(val);
        } else {
            el.value = val;
            formValues[f.id] = val;
        }
    });
}

let _lastSetValuesSeq = -1;
window.state_update = function(updates) {};

// Poll for set_values updates from caller (avoids Qt cross-thread callJS issue)
async function _pollSetValues() {
    try {
        const state = await callPython('runner_get_state', {});
        if (state && state.set_values_seq !== undefined && state.set_values_seq !== _lastSetValuesSeq) {
            _lastSetValuesSeq = state.set_values_seq;
            applySetValues(state.set_values);
        }
    } catch(e) {}
    setTimeout(_pollSetValues, 300);
}
setTimeout(_pollSetValues, 500);

// ================================================================
// STANDALONE MODE
// ================================================================
let _isStandaloneMode = false;

function initStandaloneMode(state) {
    if (!state || !state.auto_run) return;
    _isStandaloneMode = true;
}

// ================================================================
// APPINIT CALLBACKS
// ================================================================
window.getAppStateAction = () => 'runner_get_state';

// skillform manages its own theme via renderForm (schema.docProps.theme)
// Prevent common.js initStandaloneSettings from overriding it with desktop theme
window.skillformNoStandaloneTheme = true;

window.onAppStateLoaded = function(state) {
    initStandaloneMode(state);
    const urlSchemaPath = new URLSearchParams(window.location.search).get('schema_path');
    if (urlSchemaPath) {
        callPython('runner_load_schema', { path: urlSchemaPath }).then(function(res) {
            if (res && res.success && res.schema) {
                renderForm(res.schema);
            }
        });
        return;
    }
    if (state && state.schema) {
        renderForm(state.schema);
    }
};

async function onViewActivated() {
    // When tab is switched to Runner, check if designer pushed a schema
    const state = await callPython('runner_get_state', {});
    if (state && state.schema && state.waiting) {
        renderForm(state.schema);
        setStatus('', '');
    }
}
function onLanguageChange(lang) {
    _currentLang = lang || 'en';
    _refreshAllBoards();
}
